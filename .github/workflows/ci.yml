name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-check:
    name: Lint & Import Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pyflakes

      - name: Syntax check (pyflakes)
        run: pyflakes src/

      - name: Verify module imports
        run: |
          cd src
          python -c "from visionEncoder import SigLIPVisionEncoder, VisionConfig; print('visionEncoder OK')"
          python -c "from languageDecoder import GemmaLanguageModel, LanguageConfig; print('languageDecoder OK')"

      - name: Smoke test — vision encoder forward pass
        run: |
          python - <<'EOF'
          import sys; sys.path.insert(0, 'src')
          import torch
          from visionEncoder import SigLIPVisionEncoder, VisionConfig

          cfg = VisionConfig(image_size=64, patch_size=16, hidden_size=64,
                             num_hidden_layers=2, num_attention_heads=4, intermediate_size=128)
          model = SigLIPVisionEncoder(cfg)
          x = torch.randn(2, 3, 64, 64)
          out = model(x)
          n_patches = (64 // 16) ** 2
          assert out.shape == (2, n_patches, 64), f"Unexpected shape: {out.shape}"
          print(f"Vision encoder OK — output shape: {out.shape}")
          total = sum(p.numel() for p in model.parameters())
          print(f"Parameters: {total:,}")
          EOF

      - name: Smoke test — language decoder forward pass
        run: |
          python - <<'EOF'
          import sys; sys.path.insert(0, 'src')
          import torch
          from languageDecoder import GemmaLanguageModel, LanguageConfig

          cfg = LanguageConfig(vocab_size=256, hidden_size=64, intermediate_size=128,
                               num_hidden_layers=2, num_attention_heads=4,
                               num_key_value_heads=2, head_dim=16, max_position_embeddings=64)
          model = GemmaLanguageModel(cfg)
          ids = torch.randint(0, 256, (2, 32))
          logits, _ = model(ids)
          assert logits.shape == (2, 32, 256), f"Unexpected shape: {logits.shape}"
          print(f"Language decoder OK — output shape: {logits.shape}")
          total = sum(p.numel() for p in model.parameters())
          print(f"Parameters: {total:,}")
          EOF
